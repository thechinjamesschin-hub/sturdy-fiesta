<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XVORY CLOUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #030000;
      --surface: #0a0202;
      --surface-hover: #120404;
      --red-glow: rgba(255, 0, 0, 0.2);
      --red-glow-strong: rgba(255, 0, 0, 0.4);
      --red-border: rgba(200, 0, 0, 0.3);
      --red-main: #ff1a1a;
      --red-dark: #800000;
      --text-main: #ffffff;
      --text-dim: #888888;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
      position: relative;
      background-image:
        linear-gradient(to right, rgba(255, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, var(--bg) 80%);
      pointer-events: none;
      z-index: 0;
    }

    /* GATE */
    .gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .gate.out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .logo {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--red-main);
      text-shadow: 0 0 20px var(--red-main), 0 0 40px var(--red-dark);
      font-family: var(--font-mono);
      margin-bottom: 2rem;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {

      0%,
      19.999%,
      22%,
      62.999%,
      64%,
      64.999%,
      70%,
      100% {
        opacity: 1;
      }

      20%,
      21.999%,
      63%,
      63.999%,
      65%,
      69.999% {
        opacity: 0.4;
      }
    }

    .login-box {
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--red-border);
      padding: 2rem;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
      position: relative;
      z-index: 1;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--red-main);
      box-shadow: 0 0 10px var(--red-main);
    }

    .input-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--red-main);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: block;
      letter-spacing: 0.1em;
    }

    .input-field {
      width: 100%;
      background: #000;
      border: 1px solid var(--red-border);
      padding: 0.8rem;
      color: #fff;
      font-family: var(--font-mono);
      outline: none;
      margin-bottom: 1.5rem;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--red-main);
      box-shadow: 0 0 10px var(--red-glow-strong);
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      background: transparent;
      border: 1px solid var(--red-main);
      color: var(--red-main);
      font-family: var(--font-mono);
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }

    .btn:hover {
      background: var(--red-main);
      color: #000;
      box-shadow: 0 0 15px var(--red-main);
    }

    /* APP CONTAINER */
    .app {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .app.show {
      opacity: 1;
      pointer-events: all;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--red-border);
    }

    .topbar-logo {
      font-family: var(--font-mono);
      font-weight: 900;
      color: var(--red-main);
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px var(--red-glow);
    }

    .tabs {
      display: flex;
      gap: 1rem;
    }

    .tab {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .tab.active {
      color: var(--red-main);
      border-bottom-color: var(--red-main);
      text-shadow: 0 0 8px var(--red-glow);
    }

    .tab:hover:not(.active) {
      color: #fff;
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--red-border);
      padding: 1.5rem;
      position: relative;
    }

    .stat-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--red-main);
    }

    .stat-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
    }

    .stat-red {
      color: var(--red-main);
      text-shadow: 0 0 10px var(--red-glow);
    }

    /* CONFIG WORKSPACE */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1rem;
      height: calc(100vh - 120px);
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--red-border);
    }

    .editor-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--red-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 0, 0, 0.05);
    }

    .editor-title {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--red-main);
    }

    .btn-sm {
      padding: 0.4rem 1rem;
      background: var(--red-dark);
      border: 1px solid var(--red-main);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn-sm:hover {
      background: var(--red-main);
      box-shadow: 0 0 10px var(--red-main);
    }

    .editor-textarea {
      flex: 1;
      width: 100%;
      background: #000;
      border: none;
      padding: 1rem;
      color: #ffcccc;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      resize: none;
      outline: none;
    }

    .editor-textarea:focus {
      color: #fff;
    }

    /* HISTORY */
    .history-container {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--red-border);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .history-list::-webkit-scrollbar {
      width: 4px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: var(--red-main);
    }

    .history-item {
      border: 1px solid var(--red-border);
      padding: 1rem;
      margin-bottom: 1rem;
      background: #000;
      transition: border-color 0.2s;
    }

    .history-item:hover {
      border-color: var(--red-main);
      box-shadow: 0 0 10px var(--red-glow);
    }

    .hi-title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .hi-time {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .hi-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      flex: 1;
      padding: 0.4rem;
      background: transparent;
      border: 1px solid var(--red-border);
      color: var(--red-main);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      text-transform: uppercase;
    }

    .btn-action:hover {
      background: rgba(255, 0, 0, 0.1);
      border-color: var(--red-main);
    }

    /* TOAST */
    .toast-wrapper {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: #000;
      border: 1px solid var(--red-main);
      padding: 1rem;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      transform: translateX(120%);
      transition: transform 0.3s ease;
      box-shadow: 0 0 15px var(--red-glow);
    }

    .toast.show {
      transform: translateX(0);
    }
  </style>
</head>

<body>

  <div class="gate" id="gate">
    <div class="logo">XVORY</div>
    <div class="login-box">
      <label class="input-label">Access Terminal</label>
      <input type="password" class="input-field" id="keyInput" placeholder="Enter Security Key" autocomplete="off" />
      <button class="btn" id="authBtn">Connect</button>
    </div>
  </div>

  <div class="app" id="app">
    <div class="topbar">
      <div class="topbar-logo">XVORY_CLOUD</div>
      <div class="tabs">
        <button class="tab active" data-target="dashboard">Dashboard</button>
        <button class="tab" data-target="workspace">Workspace</button>
      </div>
    </div>

    <div class="content">
      <div class="view active" id="view-dashboard">
        <div class="stats">
          <div class="stat-box">
            <div class="stat-title">Network Status</div>
            <div class="stat-value stat-red">[ ONLINE ]</div>
          </div>
          <div class="stat-box">
            <div class="stat-title">Execution Mode</div>
            <div class="stat-value">Cloud-Web</div>
          </div>
          <div class="stat-box">
            <div class="stat-title">Deployed Payloads</div>
            <div class="stat-value" id="statCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-title">Last Activity</div>
            <div class="stat-value" style="font-size: 1rem;" id="statLast">N/A</div>
          </div>
        </div>
      </div>

      <div class="view" id="view-workspace">
        <div class="workspace">
          <div class="editor-container">
            <div class="editor-header">
              <span class="editor-title">payload.lua</span>
              <button class="btn-sm" id="deployBtn">Deploy Config</button>
            </div>
            <textarea class="editor-textarea" id="editor" spellcheck="false">shared.cloudwebsite = {
    ["Method"] = "Cloud-Web", -- Table, Cloud Web;

    ["Job"] = {
        ["Table-Job"] = "Hi";
    } 
}

if shared.cloudwebsite["Method"] == "Cloud-Web" then
    print("[Xvory] Executing Cloud-Web Job: " .. tostring(shared.cloudwebsite["Job"]["Table-Job"]))
    -- Add your cloud logic here, this will run inside Roblox!
else
    print("[Xvory] Local mode active.")
end</textarea>
          </div>
          <div class="history-container">
            <div class="editor-header">
              <span class="editor-title">Deployment Log</span>
            </div>
            <div class="history-list" id="historyList">
              <div
                style="color: var(--text-dim); font-family: var(--font-mono); font-size: 0.8rem; text-align: center; margin-top: 2rem;">
                No payloads deployed.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrapper" id="toastWrapper"></div>

  <script>
    // Hardcoded to prevent local file:// 404 errors when opened locally
    const RAILWAY_URL = "https://test-production-7e81.up.railway.app";
    const VALID_KEYS = ["XVORY-1234", "XVORY-ELITE", "XVORY-DEV"];

    let sessionKey = "";
    let configs = [];

    const gate = document.getElementById('gate');
    const app = document.getElementById('app');
    const keyInput = document.getElementById('keyInput');
    const authBtn = document.getElementById('authBtn');
    const tabs = document.querySelectorAll('.tab');
    const views = document.querySelectorAll('.view');
    const editor = document.getElementById('editor');
    const deployBtn = document.getElementById('deployBtn');
    const historyList = document.getElementById('historyList');
    const toastWrapper = document.getElementById('toastWrapper');
    const statCount = document.getElementById('statCount');
    const statLast = document.getElementById('statLast');

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      toastWrapper.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => {
        t.classList.remove('show');
        setTimeout(() => t.remove(), 300);
      }, 3000);
    }

    function auth() {
      const val = keyInput.value.trim().toUpperCase();
      if (VALID_KEYS.includes(val)) {
        sessionKey = val;
        gate.classList.add('out');
        setTimeout(() => app.classList.add('show'), 400);
        toast("SYSTEM ACCESS GRANTED");
      } else {
        toast("ACCESS DENIED");
      }
    }

    authBtn.addEventListener('click', auth);
    keyInput.addEventListener('keypress', e => e.key === 'Enter' && auth());

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        views.forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`view-${tab.dataset.target}`).classList.add('active');
      });
    });

    function getJobName(code) {
      const match = code.match(/\["Table-Job"\]\s*=\s*"([^"]+)"/);
      return match ? match[1] : "Unnamed_Job";
    }

    function renderHistory() {
      statCount.textContent = configs.length;
      if (configs.length === 0) {
        historyList.innerHTML = `<div style="color: var(--text-dim); font-family: var(--font-mono); font-size: 0.8rem; text-align: center; margin-top: 2rem;">No payloads deployed.</div>`;
        return;
      }

      historyList.innerHTML = configs.map(c => `
      <div class="history-item">
        <div class="hi-title">Job: ${c.name}</div>
        <div class="hi-time">${c.time}</div>
        <div class="hi-actions">
          <button class="btn-action" onclick="pushToCloud(${c.id})">Send to Cloud</button>
          <button class="btn-action" onclick="del(${c.id})">Del</button>
        </div>
      </div>
    `).join('');
    }

    deployBtn.addEventListener('click', () => {
      const code = editor.value.trim();
      if (!code) return toast("WORKSPACE EMPTY");

      const cfg = {
        id: Date.now(),
        name: getJobName(code).replace(/[&<>'"]/g, ''),
        code: code,
        time: new Date().toLocaleTimeString()
      };

      configs.unshift(cfg);
      renderHistory();
      toast("CONFIG SAVED LOCALLY");
    });

    window.del = (id) => {
      configs = configs.filter(c => c.id !== id);
      renderHistory();
    };

    window.pushToCloud = async (id) => {
      const cfg = configs.find(c => c.id === id);
      if (!cfg) return;

      toast("TRANSMITTING...");
      try {
        const res = await fetch(`${RAILWAY_URL}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: sessionKey, code: cfg.code })
        });

        if (res.ok) {
          toast("DEPLOYMENT SUCCESS");
          statLast.textContent = new Date().toLocaleTimeString();
        } else {
          toast(`DEPLOYMENT FAILED: ${res.status}`);
        }
      } catch (e) {
        toast("NETWORK ERROR - CLOUD UNREACHABLE");
      }
    };
  </script>
</body>

</html>
