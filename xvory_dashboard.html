<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xvory Cloud Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-base: #030008;
    --primary: #8a2be2;
    --primary-glow: rgba(138, 43, 226, 0.5);
    --secondary: #00d2ff;
    --secondary-glow: rgba(0, 210, 255, 0.4);
    --surface-1: rgba(20, 15, 30, 0.6);
    --surface-2: rgba(35, 25, 50, 0.5);
    --border: rgba(138, 43, 226, 0.2);
    --border-hover: rgba(0, 210, 255, 0.5);
    --text-main: #f0f0f5;
    --text-muted: #9e9ba8;
    --success: #00fa9a;
    --danger: #ff3366;
    --font-sans: 'Outfit', sans-serif;
    --font-mono: 'Fira Code', monospace;
    --radius: 12px;
  }

  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Dynamic Animated Background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: 
      radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, transparent 30%),
      radial-gradient(circle at 80% 20%, var(--secondary-glow) 0%, transparent 20%);
    opacity: 0.3;
    animation: rotateBg 30s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  
  @keyframes rotateBg {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image: 
      linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at center, black, transparent 80%);
    -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
  }

  /* ── GATE ── */
  .gate {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(3, 0, 8, 0.85);
    backdrop-filter: blur(15px);
    transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .gate.out { opacity: 0; transform: scale(1.05); pointer-events: none; }

  .gate-logo-container {
    text-align: center; margin-bottom: 3rem;
  }
  .gate-logo {
    font-size: 4rem; font-weight: 800;
    letter-spacing: 0.2em; line-height: 1;
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px var(--primary-glow));
    animation: pulse 3s infinite alternate;
  }
  @keyframes pulse {
    0% { filter: drop-shadow(0 0 15px var(--primary-glow)); }
    100% { filter: drop-shadow(0 0 35px var(--secondary-glow)); }
  }
  .gate-sub {
    font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.4em;
    color: var(--text-muted); text-transform: uppercase; margin-top: 1rem;
  }

  .gate-card {
    width: 380px; background: var(--surface-1); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2.5rem; position: relative;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .input-group { margin-bottom: 1.5rem; }
  .input-label {
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.15em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.75rem; display: block;
  }
  .gate-input {
    width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 1rem 1.25rem;
    color: var(--text-main); font-family: var(--font-mono); font-size: 1rem;
    letter-spacing: 0.2em; outline: none; transition: all 0.3s ease;
  }
  .gate-input:focus { border-color: var(--secondary); box-shadow: 0 0 15px var(--secondary-glow); }
  .gate-input.err { border-color: var(--danger); box-shadow: 0 0 15px rgba(255,51,102,0.3); }

  .btn {
    width: 100%; padding: 1rem; border: none; border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), #5a189a);
    color: white; font-family: var(--font-sans); font-size: 1rem; font-weight: 600;
    letter-spacing: 0.1em; cursor: pointer; position: relative; overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px var(--primary-glow);
  }
  .btn:hover {
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    transform: translateY(-2px); box-shadow: 0 12px 30px var(--secondary-glow);
  }
  .btn:active { transform: translateY(1px); }

  /* ── APP ── */
  .app-container {
    position: relative; z-index: 10; height: 100vh;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.8s 0.3s ease;
  }
  .app-container.show { opacity: 1; pointer-events: all; }

  /* ── TOPBAR ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 70px;
    background: var(--surface-1); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  .topbar-brand {
    font-size: 1.5rem; font-weight: 800; letter-spacing: 0.15em;
    background: linear-gradient(90deg, #fff, var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .nav-tabs { display: flex; gap: 1rem; }
  .nav-tab {
    padding: 0.5rem 1.25rem; border-radius: 8px; border: 1px solid transparent;
    background: transparent; color: var(--text-muted);
    font-family: var(--font-sans); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.3s ease;
  }
  .nav-tab.active {
    background: rgba(138, 43, 226, 0.15); border-color: var(--border);
    color: var(--text-main); box-shadow: 0 0 15px var(--primary-glow);
  }
  .nav-tab:hover:not(.active) { color: var(--text-main); background: rgba(255,255,255,0.05); }

  /* ── MAIN CONTENT ── */
  .main-content {
    flex: 1; overflow-y: auto; padding: 2rem;
  }
  .view-pane { display: none; animation: fadeIn 0.4s ease forwards; }
  .view-pane.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── DASHBOARD ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface-1); border: 1px solid rgba(255,255,255,0.05);
    border-radius: var(--radius); padding: 1.5rem;
    backdrop-filter: blur(15px); transition: all 0.3s ease;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: var(--primary); transition: width 0.3s ease; opacity: 0.8;
  }
  .stat-card:hover { transform: translateY(-5px); border-color: var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
  .stat-card:hover::before { width: 100%; opacity: 0.05; }
  
  .stat-label { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 1rem; }
  .stat-value { font-size: 1.5rem; font-weight: 600; }
  
  .badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.35rem 0.85rem; border-radius: 20px;
    font-family: var(--font-mono); font-size: 0.8rem; font-weight: 600;
  }
  .badge-success { background: rgba(0, 250, 154, 0.1); color: var(--success); border: 1px solid rgba(0, 250, 154, 0.3); }
  .badge-cloud { background: rgba(0, 210, 255, 0.1); color: var(--secondary); border: 1px solid var(--secondary-glow); }
  .dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse-dot 2s infinite; }
  .dot.success { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .dot.cloud { background: var(--secondary); box-shadow: 0 0 8px var(--secondary); }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

  /* ── CONFIG EDITOR ── */
  .config-workspace {
    display: grid; grid-template-columns: 1fr 350px; gap: 1.5rem;
    height: calc(100vh - 140px);
  }
  .editor-section {
    display: flex; flex-direction: column; background: var(--surface-1);
    border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden; backdrop-filter: blur(15px);
  }
  .editor-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.3);
  }
  .editor-title { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-muted); }
  .btn-save {
    padding: 0.5rem 1.25rem; border-radius: 6px; border: none;
    background: var(--primary); color: white; font-family: var(--font-sans); font-weight: 600;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px var(--primary-glow);
  }
  .btn-save:hover { background: var(--secondary); box-shadow: 0 4px 20px var(--secondary-glow); }

  .code-editor {
    flex: 1; width: 100%; background: #0a0812; border: none;
    padding: 1.5rem; color: #a19bb5; font-family: var(--font-mono); font-size: 0.95rem;
    line-height: 1.6; resize: none; outline: none;
  }
  .code-editor:focus { color: #e4e0f0; }

  /* ── HISTORY SIDEBAR ── */
  .history-sidebar {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: var(--radius); display: flex; flex-direction: column;
    overflow: hidden; backdrop-filter: blur(15px);
  }
  .history-header {
    padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3);
  }
  .history-count { background: var(--primary); color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
  
  .history-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
  .history-list::-webkit-scrollbar { width: 6px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .history-item {
    background: var(--surface-2); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px; padding: 1rem; transition: all 0.3s;
    animation: slideInRight 0.4s ease forwards;
  }
  .history-item:hover { border-color: var(--secondary); transform: translateX(-5px); box-shadow: -5px 5px 15px rgba(0,0,0,0.3); }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  
  .item-title { font-weight: 600; margin-bottom: 0.25rem; font-size: 0.95rem; color: #fff; }
  .item-time { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1rem; }
  
  .item-actions { display: flex; gap: 0.5rem; }
  .btn-exec {
    flex: 1; padding: 0.5rem; border-radius: 6px; background: rgba(138, 43, 226, 0.2);
    border: 1px solid var(--border); color: white; font-family: var(--font-sans); font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 0.5rem;
  }
  .btn-exec:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
  .btn-del {
    padding: 0.5rem 0.8rem; border-radius: 6px; background: transparent; border: 1px solid rgba(255,51,102,0.3);
    color: var(--danger); cursor: pointer; transition: all 0.2s;
  }
  .btn-del:hover { background: var(--danger); color: white; box-shadow: 0 0 15px rgba(255,51,102,0.4); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); opacity: 0.5; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }

  /* ── TOAST ── */
  .toast-container {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
    display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;
  }
  .toast {
    background: rgba(10, 5, 20, 0.95); border-left: 4px solid var(--primary);
    padding: 1rem 1.5rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    font-family: var(--font-mono); font-size: 0.85rem; color: white;
    transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(10px);
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--danger); }

  @media (max-width: 900px) {
    .config-workspace { grid-template-columns: 1fr; height: auto; }
    .history-sidebar { height: 400px; margin-top: 1.5rem; }
  }
</style>
</head>
<body>

<div class="grid-overlay"></div>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-logo-container">
      <div class="gate-logo">XVORY</div>
      <div class="gate-sub">Cloud Platform</div>
    </div>
    <div class="input-group">
      <label class="input-label">Terminal Access Key</label>
      <input class="gate-input" id="keyInput" type="password" placeholder="••••••••••" autocomplete="off" />
    </div>
    <button class="btn" id="authBtn">Initialize Session</button>
  </div>
</div>

<!-- APP -->
<div class="app-container" id="appContainer">
  <div class="topbar">
    <div class="topbar-brand">XVORY</div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-target="dashboard">Dashboard</button>
      <button class="nav-tab" data-target="config">Cloud Config</button>
    </div>
  </div>

  <div class="main-content">
    <!-- DASHBOARD VIEW -->
    <div class="view-pane active" id="view-dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">System Status</div>
          <div class="stat-value"><span class="badge badge-success"><span class="dot success"></span>Online</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Execution Engine</div>
          <div class="stat-value"><span class="badge badge-cloud"><span class="dot cloud"></span>Cloud-Web</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Stored Configurations</div>
          <div class="stat-value" id="statConfigCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last Operation</div>
          <div class="stat-value" style="font-family: var(--font-mono); font-size: 1rem; color: var(--secondary);" id="statLastOp">Awaiting...</div>
        </div>
      </div>
    </div>

    <!-- CONFIG VIEW -->
    <div class="view-pane" id="view-config">
      <div class="config-workspace">
        <div class="editor-section">
          <div class="editor-header">
            <span class="editor-title">workspace.lua</span>
            <button class="btn-save" id="saveBtn">Deploy Config</button>
          </div>
          <textarea class="code-editor" id="codeEditor" spellcheck="false">shared.cloudwebsite = {
    ["Method"] = "Cloud-Web", -- Table, Cloud Web;

    ["Job"] = {
        ["Table-Job"] = "Hi";
    } 
}

if shared.cloudwebsite["Method"] == "Cloud-Web" then
    print("[Xvory] Executing Cloud-Web Job: " .. tostring(shared.cloudwebsite["Job"]["Table-Job"]))
    -- Cloud execution logic goes here
else
    print("[Xvory] Local mode active.")
end</textarea>
        </div>
        
        <div class="history-sidebar">
          <div class="history-header">
            <span class="editor-title">Deployment History</span>
            <span class="history-count" id="historyCount">0</span>
          </div>
          <div class="history-list" id="historyList">
            <div class="empty-state"><div class="empty-icon">⬡</div><div>No configurations stored</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  // Configuration
  const VALID_KEYS = ["XVORY-1234", "XVORY-ELITE", "XVORY-DEV"];
  const RAILWAY_URL = window.location.origin; // Dynamically uses current host

  let sessionKey = "";
  let savedConfigs = [];

  // DOM Elements
  const gate = document.getElementById('gate');
  const appContainer = document.getElementById('appContainer');
  const keyInput = document.getElementById('keyInput');
  const authBtn = document.getElementById('authBtn');
  const navTabs = document.querySelectorAll('.nav-tab');
  const viewPanes = document.querySelectorAll('.view-pane');
  const codeEditor = document.getElementById('codeEditor');
  const saveBtn = document.getElementById('saveBtn');
  const historyList = document.getElementById('historyList');
  const historyCount = document.getElementById('historyCount');
  const statConfigCount = document.getElementById('statConfigCount');
  const statLastOp = document.getElementById('statLastOp');
  const toastContainer = document.getElementById('toastContainer');

  // Utilities
  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    toastContainer.appendChild(toast);
    
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, 4000);
  }

  function parseJobName(code) {
    const match = code.match(/\["Table-Job"\]\s*=\s*"([^"]+)"/);
    return match ? match[1] : "Unnamed Job";
  }

  function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag]));
  }

  // Authentication
  function authenticate() {
    const val = keyInput.value.trim().toUpperCase();
    if (VALID_KEYS.includes(val)) {
      sessionKey = val;
      gate.classList.add('out');
      setTimeout(() => appContainer.classList.add('show'), 400);
      showToast('Session Initialized');
    } else {
      keyInput.classList.add('err');
      showToast('Access Denied: Invalid Key', 'error');
      setTimeout(() => keyInput.classList.remove('err'), 1000);
    }
  }

  authBtn.addEventListener('click', authenticate);
  keyInput.addEventListener('keypress', e => e.key === 'Enter' && authenticate());

  // Navigation
  navTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      navTabs.forEach(t => t.classList.remove('active'));
      viewPanes.forEach(p => p.classList.remove('active'));
      
      tab.classList.add('active');
      document.getElementById(`view-${tab.dataset.target}`).classList.add('active');
    });
  });

  // Config Management
  function renderHistory() {
    statConfigCount.textContent = savedConfigs.length;
    historyCount.textContent = savedConfigs.length;

    if (savedConfigs.length === 0) {
      historyList.innerHTML = `<div class="empty-state"><div class="empty-icon">⬡</div><div>No configurations stored</div></div>`;
      return;
    }

    historyList.innerHTML = savedConfigs.map(cfg => `
      <div class="history-item" id="item-${cfg.id}">
        <div class="item-title">Job: ${escapeHTML(cfg.name)}</div>
        <div class="item-time">${cfg.time}</div>
        <div class="item-actions">
          <button class="btn-exec" onclick="executeConfig(${cfg.id})">▶ Send to Cloud</button>
          <button class="btn-del" onclick="deleteConfig(${cfg.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  saveBtn.addEventListener('click', () => {
    const code = codeEditor.value.trim();
    if (!code) {
      showToast('Workspace is empty', 'error');
      return;
    }
    
    if (!code.includes('"Cloud-Web"')) {
      showToast('Missing "Cloud-Web" configuration', 'error');
      return;
    }

    const newConfig = {
      id: Date.now(),
      name: parseJobName(code),
      code: code,
      time: new Date().toLocaleTimeString()
    };

    savedConfigs.unshift(newConfig);
    renderHistory();
    showToast('Configuration Saved');
  });

  window.deleteConfig = function(id) {
    savedConfigs = savedConfigs.filter(c => c.id !== id);
    const el = document.getElementById(`item-${id}`);
    if (el) {
      el.style.opacity = '0';
      el.style.transform = 'translateX(20px)';
      setTimeout(renderHistory, 300);
    } else {
      renderHistory();
    }
  };

  window.executeConfig = async function(id) {
    const cfg = savedConfigs.find(c => c.id === id);
    if (!cfg) return;

    showToast('Transmitting payload...', 'success');
    
    try {
      const res = await fetch(`${RAILWAY_URL}/execute`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: sessionKey, code: cfg.code })
      });

      if (res.ok) {
        const data = await res.json();
        showToast(data.note || 'Payload deployed to cloud successfully');
        statLastOp.textContent = new Date().toLocaleTimeString();
      } else {
        const err = await res.json().catch(() => ({}));
        showToast(`Deployment Failed: ${err.error || res.status}`, 'error');
      }
    } catch (error) {
      showToast('Network Error: Could not reach endpoint', 'error');
    }
  };
</script>
</body>
</html>
